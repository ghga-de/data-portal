name: E2E Tests

on:
  push:

jobs:
  test:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
          run_install: false
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Debug pnpm config
        run: |
          echo "--- global-pnpmfile ---"
          pnpm config get global-pnpmfile || true
          echo "--- pnpm config list ---"
          pnpm config list || true
          echo "--- env (npm/pnpm) ---"
          env | grep -iE 'pnpm|npm_config' || true
          echo "--- npmrc files ---"
          for f in ~/.npmrc /etc/npmrc "$PWD/.npmrc"; do
            echo "== $f =="; cat "$f" 2>/dev/null || echo "(none)"
          done
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.ignore-pnpmfile=false --config.pnpmfile=.pnpmfile.cjs
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Build application
        run: pnpm build
      - name: Run Playwright tests
        run: pnpm exec playwright test --project=chromium --project=firefox --project=webkit --workers=4
        env:
          CI: true
          FORCE_COLOR: 1
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
