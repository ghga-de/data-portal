allowedDeprecatedVersions:
  # ngx-mat-input-tel declares the deprecated @angular/platform-browser-dynamic as a
  # peer dep but never imports it; silence the install-time deprecation warning.
  '@angular/platform-browser-dynamic': '*'
  # Deep dev-only transitive dep (@compodoc/compodoc > cheerio > encoding-sniffer);
  # deprecated in favour of @exodus/bytes but not something we depend on directly.
  whatwg-encoding: '*'
allowBuilds:
  '@compodoc/compodoc': true
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  msw: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - ngx-mat-input-tel@22.0.1
  - '@angular-devkit/architect@0.2200.3'
  - '@angular-devkit/core@22.0.3'
  - '@angular-devkit/schematics@22.0.3'
  - '@angular/cli@22.0.3'
  - '@schematics/angular@22.0.3'
