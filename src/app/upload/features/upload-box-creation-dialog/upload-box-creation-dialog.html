<h2 mat-dialog-title>Create a new Upload Box</h2>

<mat-dialog-content>
  <form class="grid gap-3 pt-2">
    <mat-form-field>
      <mat-label>Title</mat-label>
      <input matInput type="text" [formField]="boxForm.title" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Description</mat-label>
      <textarea matInput rows="4" [formField]="boxForm.description"></textarea>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Storage location</mat-label>
      <mat-select [formField]="boxForm.storage_alias">
        @for (opt of locationOptions(); track opt.value) {
          <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Size limit (in TiB)</mat-label>
      <input matInput type="number" step="1" [formField]="boxForm.max_size_tb" />
    </mat-form-field>

    @if (creationError()) {
      <p class="text-error">{{ creationError() }}</p>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button
    mat-raised-button
    class="button-primary"
    type="button"
    [disabled]="isSubmitDisabled()"
    (click)="onSubmit()"
  >
    OK
  </button>
</mat-dialog-actions>
