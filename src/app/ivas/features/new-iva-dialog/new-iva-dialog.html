<h1 mat-dialog-title>Add an IVA</h1>
<div mat-dialog-content cdkTrapFocus>
  <form (ngSubmit)="onSubmit()">
    <p class="mb-3">Please select one of the following IVA types:</p>
    <div class="text-center">
      <mat-button-toggle-group
        aria-label="IVA type"
        name="type"
        [ngModel]="type()"
        (ngModelChange)="onTypeChange($event)"
        class="[&_mat-button-toggle]:w-31 sm:[&_mat-button-toggle]:w-40"
      >
        @for (type of types; track type) {
          <mat-button-toggle [value]="type.value" class="px-0 sm:px-3.5">{{
            type.text
          }}</mat-button-toggle>
        }
      </mat-button-toggle-group>
    </div>
    @if (type()) {
      <p class="mt-5">{{ valuePrompt }}</p>
      <mat-form-field class="w-full">
        @if (type() === 'Phone' || type() === 'Fax') {
          <ngx-mat-input-tel
            class="w-full"
            [preferredCountries]="['de']"
            [enablePlaceholder]="true"
            [enableSearch]="true"
            name="value"
            [ngModel]="value()"
            (ngModelChange)="value.set($event)"
            autocomplete="tel"
            maxLength="15"
            #valueField
          ></ngx-mat-input-tel>
        } @else {
          <input
            matInput
            type="text"
            autocomplete="street-address"
            name="value"
            [ngModel]="value()"
            (ngModelChange)="value.set($event)"
            cdkFocusInitial
            maxlength="500"
            #valueField
          />
        }
      </mat-form-field>
    } @else {
      <p class="mb-5"></p>
    }

    <div mat-dialog-actions>
      <button
        mat-button
        (click)="onCancel()"
        data-umami-event="New IVA Cancel Clicked"
        type="button"
      >
        Cancel
      </button>
      <button
        id="submit-code"
        mat-raised-button
        type="submit"
        [disabled]="isInvalid()"
        data-umami-event="New IVA Submit Clicked"
      >
        Submit
      </button>
    </div>
  </form>
</div>
